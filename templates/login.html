<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — RecoAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --card: #1a1a26;
  --border: #2a2a3d;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --text: #e8e8f0;
  --muted: #7070a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content:'';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 30% 30%, rgba(108,99,255,.15) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 70% 70%, rgba(255,101,132,.1) 0%, transparent 55%);
  pointer-events: none;
}

.login-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  text-align: center;
  margin-bottom: .5rem;
}
.logo span { color: var(--accent); }

.tagline {
  text-align: center;
  color: var(--muted);
  font-size: .875rem;
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1.25rem;
}
.form-group label {
  display: block;
  font-size: .8rem;
  color: var(--muted);
  margin-bottom: .5rem;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.form-group input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: .85rem 1rem;
  color: var(--text);
  font-size: .95rem;
  font-family: 'DM Sans', sans-serif;
  transition: border-color .2s;
}
.form-group input:focus {
  outline: none;
  border-color: var(--accent);
}

.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 12px;
  padding: 1rem;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: .5rem;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .2s;
}
.btn-login:hover { opacity: .9; }

.error {
  background: rgba(255,101,132,.1);
  border: 1px solid rgba(255,101,132,.3);
  border-radius: 10px;
  padding: .75rem 1rem;
  font-size: .85rem;
  color: var(--accent2);
  margin-bottom: 1.25rem;
  text-align: center;
}

.demo-accounts {
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.demo-accounts h4 {
  font-size: .75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 1rem;
  text-align: center;
}
.demo-list {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.demo-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: .6rem .9rem;
  font-size: .78rem;
  cursor: pointer;
  transition: border-color .2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.demo-item:hover { border-color: var(--accent); }
.demo-item .demo-email { color: var(--accent); }
.demo-item .demo-pass { color: var(--muted); }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">Reco<span>AI</span></div>
  <div class="tagline">ML-Powered Product Recommendations</div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder=" email " required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Password " required/>
    </div>
    <button type="submit" class="btn-login">🚀 Login </button>
  </form>

  <div class="demo-accounts">
    <h4>Demo Accounts</h4>
    <div class="demo-list">
      <div class="demo-item" onclick="fillLogin('arjun@gmail.com','arjun123')">
        <span>Arjun Sharma</span>
        <span class="demo-email">arjun@gmail.com</span>
        <span class="demo-pass">arjun123</span>
      </div>
      <div class="demo-item" onclick="fillLogin('priya@gmail.com','priya123')">
        <span>Priya Patel</span>
        <span class="demo-email">priya@gmail.com</span>
        <span class="demo-pass">priya123</span>
      </div>
      <div class="demo-item" onclick="fillLogin('rahul@gmail.com','rahul123')">
        <span>Rahul Mehta</span>
        <span class="demo-email">rahul@gmail.com</span>
        <span class="demo-pass">rahul123</span>
      </div>
    </div>
  </div>
</div>

<script>
function fillLogin(email, pass) {
  document.querySelector('input[name="email"]').value = email;
  document.querySelector('input[name="password"]').value = pass;
}
</script>
</body>
</html>
